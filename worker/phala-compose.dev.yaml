services:
  randomness-dev:
    image: ghcr.io/thomasjvu/vrf-service:0.1.8-BETA.5
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - APP_ENVIRONMENT=development
      - ENVIRONMENT=development
      - APP_VERSION=${APP_VERSION:-0.1.7-BETA}
      - PAYMENT_WALLET=${PAYMENT_WALLET:?PAYMENT_WALLET is required}
      - PAYMENT_WALLET_BASE=${PAYMENT_WALLET_BASE:-}
      - HELIUS_RPC_URL=${HELIUS_RPC_URL:?HELIUS_RPC_URL is required}
      - BASE_RPC_URL=${BASE_RPC_URL:?BASE_RPC_URL is required}
      - X402_FACILITATOR_URL=${X402_FACILITATOR_URL:-https://facilitator.payai.network}
      - SUPPORTED_NETWORKS=${SUPPORTED_NETWORKS:-solana,base}
      - ARWEAVE_ENABLED=${ARWEAVE_ENABLED:-false}
      - PHALA_APP_ID=${PHALA_APP_ID:-}
      - PHALA_CLUSTER=${PHALA_CLUSTER:-prod5}
      - REDIS_URL=${REDIS_URL:-}
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
